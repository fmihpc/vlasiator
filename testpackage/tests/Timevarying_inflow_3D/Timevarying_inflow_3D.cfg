project = Magnetosphere
ParticlePopulations = proton
dynamic_timestep = 0

[proton_properties]
mass = 1
mass_units = PROTON
charge = 1


[io]
diagnostic_write_interval = 1
write_initial_state = 0

system_write_t_interval = 12 # was 6
system_write_file_name = bulk
system_write_distribution_stride = 0
system_write_distribution_xline_stride = 10
system_write_distribution_yline_stride = 10
system_write_distribution_zline_stride = 1


[gridbuilder]
x_length = 18
y_length = 14
z_length = 14
x_min = -2.1e8
x_max = 3.3e8 #was 3.3e8
y_min = -2.1e8
y_max = 2.1e8
z_min = -2.1e8
z_max = 2.1e8
t_max = 30#was 40
dt = 0.2

[AMR]
max_spatial_level = 1 #was 1
refine_radius = 1.0e8 #about 35 RE #was 2.2e8

[proton_vspace]
vx_min = -3.96e6
vx_max = +3.96e6
vy_min = -3.96e6
vy_max = +3.96e6
vz_min = -3.96e6
vz_max = +3.96e6
vx_length = 66 # 30 km/s resolution
vy_length = 66
vz_length = 66
[proton_sparse]
minValue = 1.0e-15


[fieldsolver]
ohmHallTerm = 2
minCFL = 0.4
maxCFL = 0.5

[vlasovsolver]
minCFL = 0.8
maxCFL = 0.99
maxSlAccelerationRotation = 22

[loadBalance]
rebalanceInterval = 10

[variables]
output = populations_vg_rho
output = populations_vg_v
output = populations_vg_blocks
output = fg_b
output = fg_e
output = vg_pressure
output = vg_boundarytype
output = vg_boundarylayer
output = vg_rank
output = vg_f_saved
diagnostic = populations_vg_blocks

[boundaries]
periodic_x = no
periodic_y = no
periodic_z = no
boundary = Outflow
boundary = Maxwellian
boundary = Copysphere

[copysphere]
centerX = 0.0
centerY = 0.0
centerZ = 0.0
radius = 70e6
precedence = 2

[proton_copysphere]
rho = 1.0e6
T = 0.5e6

[outflow]
precedence = 3
[proton_outflow]
face = x-
face = y-
face = y+
face = z- 
face = z+
#face = x+ #testing, does this work that we have x+ twice like htis?

[maxwellian]
face = x+
precedence = 4
[proton_maxwellian]
dynamic = 1 #diff
file_x+ = sw1.dat


[Magnetosphere]
constBgBX = 0.0
constBgBY = 0.0
constBgBZ = 0.0
dipoleScalingFactor = 0.1 # smaller dipole for faster testing

dipoleType = 4
dipoleTiltPhi = 0.0
dipoleTiltTheta = 0
dipoleXFull = 9.5565e7 # 15 RE
dipoleXZero = 2.5e8
dipoleInflowBX = 3.53553e-9   #diff
dipoleInflowBY = -3.53553e-9  #diff
dipoleInflowBZ = 0.0

refine_L1radius = 0  #diff
refine_L1tailthick = 0  #diff

[proton_Magnetosphere]
T = 0.5e6
rho  = 1.0e6
VX0 = -7.5e5
VY0 = -7.71e4
VZ0 = 0.0

taperOuterRadius = 1.5e8
taperInnerRadius = 70e6

[bailout]
velocity_space_wall_block_margin = 0
