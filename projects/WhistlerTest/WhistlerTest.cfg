project = WhistlerTest
ParticlePopulations = proton

dynamic_timestep = 1

[io]
diagnostic_write_interval = 1
write_initial_state = 0

system_write_t_interval = 5
system_write_file_name = bulk/bulk
system_write_distribution_stride = 0
system_write_distribution_xline_stride = 1
system_write_distribution_yline_stride = 10
system_write_distribution_zline_stride = 1

[proton_properties]
mass = 1
mass_units = PROTON
charge = 1

[proton_vspace]
vx_min = -2.4e6
vx_max = +2.4e6
vy_min = -2.4e6
vy_max = +2.4e6
vz_min = -2.4e6
vz_max = +2.4e6
vx_length = 30
vy_length = 30
vz_length = 30

[proton_sparse]
minValue = 1.0e-15

[gridbuilder]
x_length = 16
y_length = 8
z_length = 8
x_min = 0.0
x_max = 1.6e6
y_min = 0.0
y_max = 0.8e6
z_min = 0.0
z_max = 0.8e6
t_max = 500.0
dt = 0.1

[bailout]
min_dt = 5e-2
velocity_space_wall_block_margin = 1

[variables]
output = populations_vg_rho
output = populations_vg_v
output = vg_e_vol
output = vg_b_vol
output = vg_pressure

diagnostic = populations_vg_blocks

[loadBalance]
rebalanceInterval = 50

[fieldsolver]
ohmHallTerm = 2
minCFL = 0.2
maxCFL = 0.25
maxSubcycles = 40
ohmGradPeTerm = 1

[vlasovsolver]
minCFL = 0.4
maxCFL = 0.49
maxSlAccelerationRotation = 10
maxSlAccelerationSubcycles = 10

[boundaries]
periodic_x = yes
periodic_y = yes
periodic_z = yes

[WhistlerTest]

amplitude = 1e-10

B0 = 1e-9
n0 = 1e6
T0 = 500e3
verbose = 1
angle = 0.0